<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestellen & Kontakt – Trinkaus & Söhne</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="styles.css">
  <style>
    .order-page-layout { display:grid; grid-template-columns:1fr 420px; gap:4rem; align-items:start; }
    .order-section-title { font-family:var(--ff-condensed); font-size:.78rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--honey-dark); margin-bottom:1.25rem; padding-bottom:.75rem; border-bottom:2px solid var(--honey); display:block; }
    .order-lines { display:flex; flex-direction:column; gap:1rem; margin-bottom:2.5rem; }
    .order-line { display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:1.25rem 1.5rem; background:var(--cream); border:2px solid var(--cream-dark); border-radius:var(--radius-md); transition:border-color .2s; }
    .order-line:focus-within { border-color:var(--honey); }
    .order-line__name { font-family:var(--ff-serif); font-size:1.05rem; color:var(--dark); display:block; }
    .order-line__unit { font-size:.82rem; color:var(--mid); margin-top:.2rem; }
    .order-line__right { display:flex; flex-direction:column; align-items:flex-end; gap:.5rem; flex-shrink:0; }
    .order-line__subtotal { font-family:var(--ff-serif); font-weight:700; font-size:1.1rem; color:var(--dark); min-width:70px; text-align:right; }
    .form-card { background:var(--white); border:2px solid var(--cream-dark); border-radius:var(--radius-lg); padding:2.5rem; }
    .form-section { margin-bottom:2rem; padding-bottom:2rem; border-bottom:1px solid var(--cream-dark); }
    .form-section:last-of-type { border-bottom:none; margin-bottom:1rem; }
    .order-sidebar { position:sticky; top:calc(var(--nav-h) + 2rem); }
    .sidebar-info { background:var(--cream); border:2px solid var(--cream-dark); border-radius:var(--radius-md); padding:1.5rem; margin-top:1.5rem; }
    .sidebar-info h4 { font-family:var(--ff-condensed); font-size:.75rem; letter-spacing:.16em; text-transform:uppercase; color:var(--mid); margin-bottom:.75rem; }
    .sidebar-info p { font-size:.9rem; color:var(--mid); line-height:1.65; max-width:none; }
    .radio-group { display:flex; flex-direction:column; gap:.75rem; }
    .radio-option { display:flex; align-items:flex-start; gap:.75rem; cursor:pointer; padding:.875rem 1rem; border:2px solid var(--cream-dark); border-radius:var(--radius-sm); transition:border-color .2s,background .2s; }
    .radio-option:has(input:checked) { border-color:var(--honey); background:rgba(240,180,41,.06); }
    .radio-option input[type="radio"] { margin-top:.15rem; accent-color:var(--honey-dark); width:16px; height:16px; flex-shrink:0; }
    .radio-option__label { font-weight:600; font-size:.95rem; color:var(--dark); display:block; }
    .radio-option__sub { font-size:.82rem; color:var(--mid); margin-top:.15rem; }
    .submit-area { margin-top:2rem; }
    .submit-area .btn { width:100%; justify-content:center; font-size:1rem; padding:1.1rem; }
    .submit-note { font-size:.8rem; color:var(--mid); text-align:center; margin-top:.75rem; }
    @media (max-width:960px) { .order-page-layout { grid-template-columns:1fr; gap:2.5rem; } .order-sidebar { position:static; order:-1; } }
    @media (max-width:480px) { .order-line { flex-direction:column; align-items:flex-start; } .order-line__right { flex-direction:row; width:100%; justify-content:space-between; } .form-card { padding:1.5rem; } }
  </style>
</head>
<body>
<nav class="nav" id="siteNav" aria-label="Hauptnavigation"></nav>
<header class="page-hero" id="pageHero"></header>
<section class="section">
  <div class="container">
    <form id="orderForm" novalidate>
      <div class="order-page-layout">
        <div>
          <div class="form-card" style="margin-bottom:2rem">
            <span class="order-section-title">1. Produkte wählen</span>
            <div id="orderLines" class="order-lines"></div>
          </div>
          <div class="form-card">
            <span class="order-section-title">2. Ihre Angaben</span>
            <div class="form-section">
              <div class="form-grid">
                <div class="form-group"><label class="form-label" for="vorname">Vorname</label><input class="form-input" type="text" id="vorname" name="vorname" autocomplete="given-name" required placeholder="Max"></div>
                <div class="form-group"><label class="form-label" for="nachname">Nachname</label><input class="form-input" type="text" id="nachname" name="nachname" autocomplete="family-name" required placeholder="Mustermann"></div>
                <div class="form-group"><label class="form-label" for="email">E-Mail</label><input class="form-input" type="email" id="email" name="email" autocomplete="email" required placeholder="max@beispiel.de"></div>
                <div class="form-group"><label class="form-label form-label--optional" for="telefon">Telefon</label><input class="form-input" type="tel" id="telefon" name="telefon" autocomplete="tel" placeholder="+49 ..."></div>
                <div class="form-group form-grid--full"><label class="form-label" for="strasse">Straße & Hausnummer</label><input class="form-input" type="text" id="strasse" name="strasse" autocomplete="street-address" required placeholder="Musterstraße 12"></div>
                <div class="form-group"><label class="form-label" for="plz">PLZ</label><input class="form-input" type="text" id="plz" name="plz" autocomplete="postal-code" required placeholder="58452"></div>
                <div class="form-group"><label class="form-label" for="ort">Ort</label><input class="form-input" type="text" id="ort" name="ort" autocomplete="address-level2" required placeholder="Witten"></div>
              </div>
            </div>
            <div class="form-section">
              <span class="order-section-title" style="font-size:.72rem">3. Übergabe</span>
              <div class="radio-group">
                <label class="radio-option"><input type="radio" name="uebergabe" value="abholung" checked><div><span class="radio-option__label">Abholung in Witten</span><span class="radio-option__sub">Wir stimmen Ort und Zeit per E-Mail ab.</span></div></label>
                <label class="radio-option"><input type="radio" name="uebergabe" value="lieferung"><div><span class="radio-option__label">Lieferung / Anfrage</span><span class="radio-option__sub">Wir prüfen Möglichkeiten und melden uns bei Ihnen.</span></div></label>
              </div>
            </div>
            <div class="form-section">
              <span class="order-section-title" style="font-size:.72rem">4. Bemerkungen</span>
              <div class="form-group"><label class="form-label form-label--optional" for="bemerkung">Ihre Nachricht an uns</label><textarea class="form-textarea" id="bemerkung" name="bemerkung" placeholder="Besondere Wünsche, Fragen zur Verfügbarkeit, gewünschter Abholtermin …"></textarea></div>
            </div>
            <div class="submit-area">
              <button type="submit" class="btn btn--primary btn--lg" id="submitBtn">Bestellung senden →</button>
              <p class="submit-note">Ihre Daten werden nur zur Bestellabwicklung verwendet.<br>Kein Newsletter, kein Spam. Versprochen.</p>
            </div>
          </div>
        </div>
        <div class="order-sidebar" id="orderSidebar"></div>
      </div>
    </form>
  </div>
</section>
<footer class="footer" id="siteFooter"></footer>
<script src="config.js"></script>
<script src="components.js"></script>
<script src="main.js"></script>
</body>
</html>
