<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trinkaus & Söhne</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="styles.css">
  <style>
    .hero { min-height:100vh; background:var(--honey); display:flex; align-items:center; padding-top:var(--nav-h); position:relative; overflow:hidden; }
    .hero__bg-hex  { position:absolute; right:-80px;  bottom:-60px; width:520px; opacity:.09; }
    .hero__bg-hex2 { position:absolute; left:-120px; top:60px; width:340px; opacity:.06; }
    .hero__content { position:relative; z-index:2; max-width:640px; }
    .hero__eyebrow { display:flex; align-items:center; gap:.75rem; margin-bottom:1.5rem; }
    .hero__eyebrow-line { width:32px; height:2px; background:var(--dark); }
    .hero h1 { font-size:clamp(2.8rem,5.5vw,4.4rem); font-weight:900; line-height:1.05; margin-bottom:1.5rem; color:var(--dark); }
    .hero h1 em { font-style:italic; display:block; }
    .hero__sub { font-size:1.15rem; color:var(--charcoal); line-height:1.7; margin-bottom:2.5rem; max-width:48ch; }
    .hero__actions { display:flex; gap:1rem; flex-wrap:wrap; }
    .preview-strip { background:var(--dark); padding:2.5rem 0; }
    .preview-strip__inner { display:flex; align-items:center; gap:3rem; flex-wrap:wrap; }
    .preview-strip__label { font-family:var(--ff-condensed); font-size:.75rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.4); white-space:nowrap; }
    #previewCards { display:flex; gap:1.5rem; flex-wrap:wrap; }
    .preview-card { display:flex; align-items:center; gap:.75rem; color:var(--white); }
    .preview-card__dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .preview-card__name { font-family:var(--ff-serif); font-size:1rem; display:block; color:var(--white); }
    .preview-card__price { font-size:.8rem; color:rgba(255,255,255,.5); margin-top:.1rem; }
    .preview-card .label--honey { color:var(--honey); }
    .about-teaser { display:grid; grid-template-columns:1fr 1fr; gap:5rem; align-items:center; }
    .about-teaser__visual { background:var(--honey); border-radius:var(--radius-lg); aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .about-teaser__logo-center { position:absolute; text-align:center; }
    .about-teaser__brand { font-family:var(--ff-serif); font-size:1.4rem; font-weight:700; color:var(--dark); display:block; }
    .about-teaser__brand-sub { font-family:var(--ff-condensed); font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--charcoal); display:block; margin-top:2px; }
    .about-teaser__text p { font-size:1rem; line-height:1.75; color:var(--mid); margin-bottom:1.5rem; }
    .about-teaser__text h2 { margin:.75rem 0 1.25rem; }
    @media (max-width:768px) { .about-teaser { grid-template-columns:1fr; gap:2.5rem; } .preview-strip__inner { gap:1.5rem; } }
  </style>
</head>
<body>
<nav class="nav" id="siteNav" aria-label="Hauptnavigation"></nav>
<section class="hero">
  <svg class="hero__bg-hex" viewBox="0 0 500 500" fill="none" aria-hidden="true"><g stroke="#1C1C1B" stroke-width="1.5"><polygon points="250,20 420,116 420,308 250,404 80,308 80,116"/><polygon points="250,60 390,135 390,285 250,360 110,285 110,135"/></g></svg>
  <svg class="hero__bg-hex2" viewBox="0 0 300 300" fill="none" aria-hidden="true"><polygon points="150,15 255,72.5 255,187.5 150,245 45,187.5 45,72.5" stroke="#1C1C1B" stroke-width="2"/></svg>
  <div id="homeHero"></div>
</section>
<div class="preview-strip" id="previewStrip"></div>
<section class="section section--cream" id="homeValues"></section>
<section class="section" id="aboutTeaser"></section>
<section class="section--honey section--sm" id="ctaBanner"></section>
<footer class="footer" id="siteFooter"></footer>
<script src="config.js"></script>
<script src="components.js"></script>
<script src="main.js"></script>
</body>
</html>
