<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unser Honig – Trinkaus & Söhne</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="styles.css">
  <style>
    .product-detail { display:grid; grid-template-columns:1fr 1fr; gap:5rem; align-items:start; margin-bottom:5rem; padding-bottom:5rem; border-bottom:1px solid var(--cream-dark); }
    .product-detail:last-child { border-bottom:none; margin-bottom:0; }
    .product-detail--reverse { direction:rtl; }
    .product-detail--reverse > * { direction:ltr; }
    .product-visual { border-radius:var(--radius-lg); aspect-ratio:1; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .product-visual__label { font-family:var(--ff-script); font-size:3.5rem; color:var(--dark); position:relative; z-index:2; }
    .product-visual__bg { position:absolute; inset:0; opacity:.12; }
    .product-info__tag { display:inline-flex; align-items:center; gap:.5rem; background:var(--cream-dark); border-radius:2px; padding:.3rem .8rem; font-family:var(--ff-condensed); font-weight:600; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--charcoal); margin-bottom:1rem; }
    .product-info h2 { margin-bottom:1.25rem; }
    .product-info__desc { font-size:1.05rem; line-height:1.8; color:var(--mid); margin-bottom:2rem; }
    .product-info__details { display:flex; gap:2rem; margin-bottom:2rem; padding:1.5rem; background:var(--cream); border-radius:var(--radius-md); }
    .product-info__detail-item { display:flex; flex-direction:column; gap:.25rem; }
    .product-info__detail-key { font-family:var(--ff-condensed); font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--mid); }
    .product-info__detail-val { font-family:var(--ff-serif); font-size:1.3rem; font-weight:700; color:var(--dark); }
    .taste-notes { margin-top:1rem; }
    .taste-notes h4 { font-family:var(--ff-condensed); font-size:.75rem; letter-spacing:.16em; text-transform:uppercase; color:var(--mid); margin-bottom:.75rem; }
    .taste-tags { display:flex; gap:.5rem; flex-wrap:wrap; }
    .taste-tag { background:var(--dark); color:var(--honey); font-family:var(--ff-condensed); font-weight:600; font-size:.72rem; letter-spacing:.08em; padding:.3rem .75rem; border-radius:2px; }
    @media (max-width:768px) { .product-detail, .product-detail--reverse { grid-template-columns:1fr; direction:ltr; gap:2rem; } }
  </style>
</head>
<body>
<nav class="nav" id="siteNav" aria-label="Hauptnavigation"></nav>
<header class="page-hero" id="pageHero"></header>
<section class="section section--cream">
  <div class="container">
    <div id="productsGrid" class="products-grid"></div>
  </div>
</section>
<section class="section">
  <div class="container">
    <div id="productDetails"></div>
  </div>
</section>
<section class="section--sm section--dark" id="availabilityNote"></section>
<footer class="footer" id="siteFooter"></footer>
<script src="config.js"></script>
<script src="components.js"></script>
<script src="main.js"></script>
</body>
</html>
