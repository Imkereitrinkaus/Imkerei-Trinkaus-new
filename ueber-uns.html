<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Über uns – Trinkaus & Söhne</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="styles.css">
  <style>
    .story-grid { display:grid; grid-template-columns:1fr 1fr; gap:5rem; align-items:center; }
    .story-visual { background:var(--honey); border-radius:var(--radius-lg); aspect-ratio:3/4; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .story-visual__hex { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:.15; }
    .story-visual__center { position:relative; z-index:2; text-align:center; }
    .story-visual__year { font-family:var(--ff-serif); font-size:5rem; font-weight:900; color:var(--dark); opacity:.18; position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); white-space:nowrap; }
    .story-text blockquote { font-family:var(--ff-serif); font-size:1.35rem; font-style:italic; line-height:1.55; border-left:4px solid var(--honey); padding-left:1.5rem; margin:2rem 0; }
    .story-text p { font-size:1rem; line-height:1.8; color:var(--mid); margin-bottom:1.25rem; max-width:56ch; }
    .principles { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1.5rem; margin-top:3rem; }
    .principle-card { padding:2rem; border:2px solid var(--cream-dark); border-radius:var(--radius-md); transition:border-color .2s,transform .2s; }
    .principle-card:hover { border-color:var(--honey); transform:translateY(-3px); }
    .principle-card__number { font-family:var(--ff-serif); font-size:2.5rem; font-weight:900; color:var(--honey); line-height:1; margin-bottom:.75rem; }
    .principle-card h3 { font-size:1.05rem; margin-bottom:.5rem; }
    .principle-card p { font-size:.9rem; color:var(--mid); line-height:1.65; }
    .bees-strip { background:var(--dark); padding:3.5rem 0; text-align:center; }
    .stat-row { display:flex; justify-content:center; gap:4rem; flex-wrap:wrap; margin-top:2.5rem; }
    .stat-item { text-align:center; }
    .stat-item__num { font-family:var(--ff-serif); font-size:3rem; font-weight:900; color:var(--honey); line-height:1; display:block; }
    .stat-item__label { font-family:var(--ff-condensed); font-size:.75rem; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.45); display:block; margin-top:.4rem; }
    @media (max-width:768px) { .story-grid { grid-template-columns:1fr; gap:2.5rem; } .stat-row { gap:2.5rem; } }
  </style>
</head>
<body>
<nav class="nav" id="siteNav" aria-label="Hauptnavigation"></nav>
<header class="page-hero" id="pageHero"></header>
<section class="section" id="aboutStory"></section>
<div class="bees-strip" id="aboutStats"></div>
<section class="section section--cream" id="aboutPrinciples"></section>
<section class="section--honey section--sm" id="aboutCta"></section>
<footer class="footer" id="siteFooter"></footer>
<script src="config.js"></script>
<script src="components.js"></script>
<script src="main.js"></script>
</body>
</html>
